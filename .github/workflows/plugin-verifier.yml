name: Plugin Verifier

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run plugin verification
        run: ./gradlew verifyPlugin --no-daemon